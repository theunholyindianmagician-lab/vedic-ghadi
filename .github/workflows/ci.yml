name: 🔱 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Concurrency: cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  # Google Cloud Run deploy targets (no Vercel)
  # Region: asia-southeast1 (Singapore) — supports custom domain mappings.
  # ghadi.lunarluxury.in is mapped to this service. Mumbai (asia-south1) was
  # the initial home but Cloud Run domain mappings are not available there.
  GCP_PROJECT: trikala-production
  GCP_REGION: asia-southeast1
  GCP_SERVICE: vedic-ghadi
  GCP_WIF_PROVIDER: projects/485760975792/locations/global/workloadIdentityPools/github/providers/github-actions
  GCP_SA: vedic-ghadi-ci@trikala-production.iam.gserviceaccount.com

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Python: substrate + audit + 133 pytest assertions
  # ─────────────────────────────────────────────────────────────────────────
  python:
    name: 🐍 Python · pytest + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install backend (with server + dev extras)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[server,dev]"
      - name: Run pytest
        working-directory: backend
        run: pytest -q --tb=short
      - name: Run substrate audit (157 checks)
        run: python scripts/audit_formulae.py

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend: typecheck + production build
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    name: 🎨 Frontend · typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm install --legacy-peer-deps --no-audit --no-fund
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Production build
        working-directory: frontend
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────
  # Py↔TS parity (requires both Python + Node)
  # ─────────────────────────────────────────────────────────────────────────
  parity:
    name: ⚖️  Py↔TS parity (84 meridians × 4 anchors)
    runs-on: ubuntu-latest
    needs: [python, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run Py↔TS parity test
        working-directory: backend
        run: pytest tests/test_parity.py -v

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy: Cloud Run via Workload Identity Federation (keyless OIDC)
  # Runs only after all test jobs pass on main pushes
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy · Cloud Run (asia-southeast1)
    runs-on: ubuntu-latest
    needs: [python, frontend, parity]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # required for OIDC token → WIF auth
    outputs:
      service_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Deploy to Cloud Run from frontend/ source
        id: deploy
        working-directory: frontend
        run: |
          gcloud run deploy ${{ env.GCP_SERVICE }} \
            --source . \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 5 \
            --min-instances 0 \
            --timeout 60s \
            --quiet
          URL=$(gcloud run services describe ${{ env.GCP_SERVICE }} \
            --region ${{ env.GCP_REGION }} --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "::notice title=🚀 Live on Cloud Run::$URL"

  # ─────────────────────────────────────────────────────────────────────────
  # E2E: Playwright against the freshly-deployed Cloud Run URL
  # ─────────────────────────────────────────────────────────────────────────
  e2e-live:
    name: 🎭 E2E · Playwright vs Cloud Run
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm install --legacy-peer-deps --no-audit --no-fund
      - name: Install Playwright chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E against ${{ needs.deploy.outputs.service_url }}
        working-directory: frontend
        env:
          BASE_URL: ${{ needs.deploy.outputs.service_url || 'https://vedic-ghadi-485760975792.asia-southeast1.run.app' }}
        run: npx playwright test --reporter=list
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
