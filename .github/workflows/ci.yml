name: 🔱 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Concurrency: cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Python: substrate + audit + 133 pytest assertions
  # ─────────────────────────────────────────────────────────────────────────
  python:
    name: 🐍 Python · pytest + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install backend (with server + dev extras)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[server,dev]"
      - name: Run pytest
        working-directory: backend
        run: pytest -q --tb=short
      - name: Run substrate audit (157 checks)
        run: python scripts/audit_formulae.py

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend: typecheck + production build
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    name: 🎨 Frontend · typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm install --legacy-peer-deps --no-audit --no-fund
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Production build
        working-directory: frontend
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────
  # Py↔TS parity (requires both Python + Node)
  # ─────────────────────────────────────────────────────────────────────────
  parity:
    name: ⚖️  Py↔TS parity (84 meridians × 4 anchors)
    runs-on: ubuntu-latest
    needs: [python, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run Py↔TS parity test
        working-directory: backend
        run: pytest tests/test_parity.py -v

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy: trigger Vercel deploy hook (bypasses CLI rate limit + GitHub App)
  # Runs only AFTER all test jobs pass on main pushes
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy · trigger Vercel build
    runs-on: ubuntu-latest
    needs: [python, frontend, parity]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      deploy_url: ${{ steps.poll.outputs.url }}
    steps:
      - name: Fire Vercel deploy hook
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_URL secret not set"
            exit 1
          fi
          RESPONSE=$(curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}")
          echo "Hook response: $RESPONSE"
          JOB_ID=$(echo "$RESPONSE" | python3 -c 'import sys,json; print(json.load(sys.stdin)["job"]["id"])')
          echo "Deploy job: $JOB_ID"
          echo "deploy_job=$JOB_ID" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
      - name: Poll deployment for current commit until READY (up to 5 min)
        id: poll
        env:
          PROJECT_ID: prj_nFTiBe0zfWbZosAPfzR8Aoi7K7Wd
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: python3 scripts/poll_vercel_deploy.py

  # ─────────────────────────────────────────────────────────────────────────
  # E2E: Playwright against the freshly-deployed Vercel URL
  # ─────────────────────────────────────────────────────────────────────────
  e2e-live:
    name: 🎭 E2E · Playwright vs live deployment
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm install --legacy-peer-deps --no-audit --no-fund
      - name: Install Playwright chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E against ${{ needs.deploy.outputs.deploy_url || 'fallback URL' }}
        working-directory: frontend
        env:
          BASE_URL: ${{ needs.deploy.outputs.deploy_url || 'https://vedic-ghadi-hs60jl57t-theunholyindianmagicians-projects.vercel.app' }}
        run: npx playwright test --reporter=list
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
